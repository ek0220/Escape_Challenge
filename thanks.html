<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>Submission Status</title>
</head>
<body style="text-align:center; font-family:sans-serif; margin-top:50px;">
	<script>
		const params = new URLSearchParams(window.location.search);
		if (params.get("success") === "1") {
		  document.write("<h2>✅ Thanks! Your response has been submitted.</h2>");
		} else {
		  document.write("<h2>❌ Submission failed, please try again.</h2>");
		}
  	</script>
</body>
</html>
